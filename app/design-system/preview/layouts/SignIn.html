<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Sign In - Layout Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @import '../../tokens/colors.css';
    @import '../../tokens/typography.css';
    @import '../../tokens/spacing.css';
    @import '../../tokens/effects.css';

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family-primary);
      background: var(--color-surface);
      color: var(--color-text-primary);
      width: 1440px;
      min-height: 1137px;
    }

    /* ── Two-column layout ── */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(1137px - 34px);
      width: 1440px;
    }

    /* ── Form area (left column) ── */
    .form-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--spacing-12) var(--spacing-8) var(--spacing-12) 63px;
      background: var(--color-surface);
    }

    .form-heading {
      font-family: var(--font-family-primary);
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      background: var(--gradient-info);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.033em;
      line-height: 1.17;
      margin-bottom: var(--spacing-2);
    }

    .form-subtitle {
      font-family: var(--font-family-primary);
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-muted);
      letter-spacing: -0.033em;
      margin-bottom: var(--spacing-8);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-1);
      margin-bottom: var(--spacing-4);
    }

    .form-label {
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      letter-spacing: -0.028em;
    }

    .form-input {
      width: 361px;
      height: 40px;
      background: var(--color-surface);
      border-radius: 6px;
      border: 1px solid var(--color-divider);
      padding: 0 var(--spacing-3);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      outline: none;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .form-input::placeholder {
      color: var(--color-placeholder);
    }

    .form-input.active {
      border: 1px solid #e293d3;
      box-shadow: 0 0 0 2px rgba(226, 147, 211, 0.50);
    }

    /* ── Remember me toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      margin-bottom: var(--spacing-4);
    }

    .toggle-track {
      position: relative;
      width: 42px;
      height: 20px;
      background: #3a416f;
      border-radius: 10.5px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      background: var(--color-surface);
      border-radius: 8px;
      box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.07), 0 4px 6px -1px rgba(0, 0, 0, 0.12);
    }

    .toggle-label {
      font-family: var(--font-family-primary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    /* ── Sign In button ── */
    .btn-signin {
      display: block;
      width: 361px;
      height: 40px;
      background: var(--gradient-info);
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.07), 0 4px 6px -1px rgba(0, 0, 0, 0.12);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      color: var(--color-surface);
      text-align: center;
      letter-spacing: -0.028em;
      cursor: pointer;
      margin-bottom: var(--spacing-6);
    }

    /* ── Signup footer link ── */
    .signup-link {
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
    }

    .signup-link-text {
      font-family: var(--font-family-primary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-muted);
      letter-spacing: -0.028em;
    }

    .signup-link-action {
      font-family: var(--font-family-primary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      background: var(--gradient-info);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      letter-spacing: -0.028em;
    }

    /* ── Image area (right column) ── */
    .image-area {
      background-image: url('../../assets/images/photos/curved6.png');
      background-size: cover;
      background-position: center;
      min-height: 1137px;
    }
  </style>
</head>
<body>
  <!-- Shell: navbar-auth -->
  <!-- Shell: navbar-auth | Source: Sign Up -->
<header class="shell-navbar-auth" style="
  position: sticky;
  top: 0;

  -webkit-backdrop-filter: blur(10px);

  margin: var(--spacing-4) var(--spacing-8);
  padding: 0 var(--spacing-4);
  display: flex;
  align-items: center;
  justify-content: space-between;

  box-shadow: var(--shadow-lg);
">

  <span style="
    font-family: var(--font-family-secondary);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    color: white;

  <nav style="display: flex; align-items: center; gap: var(--spacing-4);">
    <a href="#" data-screen="Dashboard-sidebar transparent" style="

      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-regular);

      <i data-lucide="layout-dashboard" style="width: 12px; height: 12px;"></i>
      Dashboard
    </a>
    <a href="#" data-screen="Profile" style="
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-regular);
    ">
      <i data-lucide="user" style="width: 12px; height: 12px;"></i>
      Profile
    </a>
    <a href="#" data-screen="Sign Up" style="
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-regular);
    ">
      <i data-lucide="user-plus" style="width: 12px; height: 12px;"></i>
      Sign Up
    </a>
    <a href="#" data-screen="Sign In" style="
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: white;
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-bold);
    ">
      <i data-lucide="calendar" style="width: 12px; height: 12px;"></i>
      Sign In
    </a>
  </nav>

  <!-- Free Download Button -->
  <a href="#" style="
    display: inline-flex;
    align-items: center;
    padding: var(--spacing-1) var(--spacing-3);
    background: white;
    color: var(--color-dark);
    font-family: var(--font-family-primary);
    font-size: 0.625rem;
    font-weight: var(--font-weight-bold);
    text-decoration: none;
    border-radius: var(--radius-full);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  ">FREE DOWNLOAD</a>
</header>

  <main class="main-content">
    <!-- Left column: form area -->
    <div class="form-area">
      <h1 class="form-heading">Sign In</h1>
      <p class="form-subtitle">Enter your email and password to sign in</p>

      <!-- Email field (active state) -->
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          class="form-input active"
          type="email"
          placeholder="Email"
        >
      </div>

      <!-- Password field (default state) -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          class="form-input"
          type="password"
          placeholder="Password"
        >
      </div>

      <!-- Remember me toggle -->
      <div class="toggle-row">
        <div class="toggle-track" role="switch" aria-checked="true" tabindex="0">
          <div class="toggle-thumb"></div>
        </div>
        <span class="toggle-label">Remember me</span>
      </div>

      <!-- Sign In button -->
      <button class="btn-signin" type="button">SIGN IN</button>

      <!-- Don't have an account? -->
      <div class="signup-link">
        <span class="signup-link-text">Don&rsquo;t have an account?</span>
        <a href="#" class="signup-link-action">Sign Up</a>
      </div>
    </div>

    <!-- Right column: decorative image -->
    <div class="image-area" role="img" aria-label="Colorful abstract wave decoration"></div>
  </main>

  <!-- Shell: footer-auth -->
  <!-- Shell: footer-auth | Source: Sign Up -->

  flex-direction: column;

  gap: var(--spacing-4);
  background: transparent;
">
