<!-- Shell: navbar-auth | Source: Sign Up -->
<header class="shell-navbar-auth" style="
  position: sticky;
  top: 0;
  height: 34px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-pill);
  margin: var(--spacing-4) var(--spacing-8);
  padding: 0 var(--spacing-4);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
  box-shadow: var(--shadow-lg);
">
  <!-- Brand Name -->
  <span style="
    font-family: var(--font-family-secondary);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    color: white;
  ">Soft UI Dashboard</span>

  <!-- Nav Links -->
  <nav style="display: flex; align-items: center; gap: var(--spacing-4);">
    <a href="#" data-screen="Dashboard-sidebar transparent" style="
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-regular);
    ">
      <i data-lucide="layout-dashboard" style="width: 12px; height: 12px;"></i>
      Dashboard
    </a>
    <a href="#" data-screen="Profile" style="
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-regular);
    ">
      <i data-lucide="user" style="width: 12px; height: 12px;"></i>
      Profile
    </a>
    <a href="#" data-screen="Sign Up" style="
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-regular);
    ">
      <i data-lucide="user-plus" style="width: 12px; height: 12px;"></i>
      Sign Up
    </a>
    <a href="#" data-screen="Sign In" style="
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-2xs);
      font-weight: var(--font-weight-regular);
    ">
      <i data-lucide="calendar" style="width: 12px; height: 12px;"></i>
      Sign In
    </a>
  </nav>

  <!-- Free Download Button -->
  <a href="#" style="
    display: inline-flex;
    align-items: center;
    padding: var(--spacing-1) var(--spacing-3);
    background: white;
    color: var(--color-dark);
    font-family: var(--font-family-primary);
    font-size: 0.625rem;
    font-weight: var(--font-weight-bold);
    text-decoration: none;
    border-radius: var(--radius-full);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  ">FREE DOWNLOAD</a>
</header>
