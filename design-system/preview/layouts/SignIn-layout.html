<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignIn Layout Preview - Soft UI Dashboard</title>

  <!-- Import design system tokens -->
  <style>
    @import url('../../tokens/colors.css');
    @import url('../../tokens/typography.css');
    @import url('../../tokens/spacing.css');
    @import url('../../tokens/effects.css');
  </style>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
      color: #252525;
    }

    /* Layout Container */
    .screen-container {
      width: 1440px;
      height: 1137px;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* Navbar */
    .navbar {
      height: 70px;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 40px;
      border-bottom: 1px solid #e9ecef;
      gap: 40px;
    }

    .navbar-logo {
      font-size: 18px;
      font-weight: 600;
      color: #252525;
      margin-right: auto;
    }

    .navbar-nav {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .navbar-nav a {
      text-decoration: none;
      color: #252525;
      font-size: 14px;
      font-weight: 500;
    }

    .navbar-cta {
      padding: 8px 16px;
      background: linear-gradient(310deg, #7928ca 0%, #ff0080 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Main Content */
    .content-wrapper {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    /* Left Column - Form */
    .form-column {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 80px;
      background-color: #ffffff;
    }

    .form-title {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(310deg, #7928ca 0%, #ff0080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .form-subtitle {
      font-size: 16px;
      color: #8392ab;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #252525;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d2d6da;
      border-radius: 8px;
      font-size: 14px;
      background-color: #ffffff;
      color: #252525;
      font-family: inherit;
    }

    .form-input::placeholder {
      color: #8392ab;
    }

    .form-input:focus {
      outline: none;
      border-color: #cb0c9f;
      box-shadow: 0 0 0 3px rgba(203, 12, 159, 0.1);
    }

    /* Remember Me Toggle */
    .remember-me-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 20px;
      background-color: #3a414f;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .toggle-switch.off {
      background-color: #dee2e6;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background-color: #ffffff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.3s;
    }

    .toggle-switch.on::after {
      left: 24px;
    }

    .remember-label {
      font-size: 14px;
      color: #252525;
      font-weight: 500;
    }

    /* Sign In Button */
    .signin-button {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(310deg, #7928ca 0%, #ff0080 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin: 24px 0;
      transition: transform 0.2s;
    }

    .signin-button:hover {
      transform: translateY(-2px);
    }

    .signin-button:active {
      transform: translateY(0);
    }

    /* Sign Up Link */
    .signup-link {
      text-align: center;
      font-size: 14px;
      color: #8392ab;
    }

    .signup-link a {
      text-decoration: none;
      background: linear-gradient(310deg, #7928ca 0%, #ff0080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
      cursor: pointer;
    }

    /* Right Column - Image */
    .image-column {
      background: linear-gradient(135deg, #ff1493 0%, #00ffff 25%, #ffff00 50%, #00ff00 75%, #ff1493 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .wave-decoration {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.9;
      background:
        radial-gradient(circle at 20% 50%, rgba(255, 20, 147, 0.8) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.8) 0%, transparent 50%),
        radial-gradient(circle at 50% 20%, rgba(255, 255, 0, 0.8) 0%, transparent 50%),
        linear-gradient(135deg, #cb0c9f 0%, #7928ca 50%, #00ffff 100%);
      animation: wave 8s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.05) rotate(5deg); }
    }

    .image-placeholder {
      position: relative;
      z-index: 1;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      font-weight: 500;
    }

    /* Footer */
    .footer {
      height: 132px;
      background-color: #ffffff;
      border-top: 1px solid #e9ecef;
      padding: 24px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 14px;
      color: #8392ab;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copyright {
      flex: 1;
    }

    .footer-social {
      display: flex;
      gap: 16px;
      flex: 1;
      justify-content: center;
    }

    .footer-social a {
      text-decoration: none;
      color: #8392ab;
      font-size: 16px;
    }

    .footer-links {
      flex: 1;
      display: flex;
      gap: 40px;
      justify-content: flex-end;
    }

    .footer-links-group {
      display: flex;
      gap: 16px;
      flex-direction: column;
    }

    .footer-links-group-title {
      font-weight: 600;
      color: #8392ab;
    }

    .footer-links a {
      text-decoration: none;
      color: #8392ab;
      font-size: 13px;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 1440px) {
      .screen-container {
        width: 100%;
        height: auto;
      }

      .content-wrapper {
        grid-template-columns: 1fr;
        min-height: 600px;
      }

      .image-column {
        display: none;
      }

      .form-column {
        padding: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="screen-container">
    <!-- Navbar -->
    <div class="navbar">
      <div class="navbar-logo">Soft UI Dashboard</div>
      <div class="navbar-nav">
        <a href="#dashboard">Dashboard</a>
        <a href="#profile">Profile</a>
        <a href="#signup">Sign Up</a>
        <a href="#signin">Sign In</a>
      </div>
      <button class="navbar-cta">FREE DOWNLOAD</button>
    </div>

    <!-- Main Content -->
    <div class="content-wrapper">
      <!-- Left Column: Form -->
      <div class="form-column">
        <div class="form-title">Sign In</div>
        <div class="form-subtitle">Enter your email and password to sign in</div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="Email" value="Email">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Password" value="Password">
        </div>

        <div class="remember-me-row">
          <div class="toggle-switch on" onclick="this.classList.toggle('on'); this.classList.toggle('off');"></div>
          <label class="remember-label">Remember me</label>
        </div>

        <button class="signin-button">SIGN IN</button>

        <div class="signup-link">
          Don't have an account? <a href="#signup">Sign Up</a>
        </div>
      </div>

      <!-- Right Column: Decorative Image -->
      <div class="image-column">
        <div class="wave-decoration"></div>
        <div class="image-placeholder">Colorful gradient wave pattern</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-content">
        <div class="footer-copyright">
          Copyright © 2021 Soft by Creative Tim.
        </div>
        <div class="footer-social">
          <a href="#facebook" title="Facebook">f</a>
          <a href="#twitter" title="Twitter">𝕏</a>
          <a href="#linkedin" title="LinkedIn">in</a>
          <a href="#pinterest" title="Pinterest">P</a>
          <a href="#github" title="GitHub">⭘</a>
        </div>
        <div class="footer-links">
          <div class="footer-links-group">
            <div class="footer-links-group-title">Company</div>
            <a href="#about">About Us</a>
            <a href="#team">Team</a>
            <a href="#products">Products</a>
          </div>
          <div class="footer-links-group">
            <a href="#blog">Blog</a>
            <a href="#pricing">Pricing</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
